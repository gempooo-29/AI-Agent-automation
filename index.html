<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 800px;
            height: 90vh;
            background: #16213e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: linear-gradient(135deg, #0f3460, #533483);
            padding: 20px;
            text-align: center;
            color: white;
        }

        .chat-header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #533483; border-radius: 5px; }

        .message {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .user .avatar { background: #0f3460; }
        .agent .avatar { background: #533483; }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .user .bubble {
            background: #0f3460;
            border-bottom-right-radius: 4px;
        }

        .agent .bubble {
            background: #1a1a3e;
            border-bottom-left-radius: 4px;
            border: 1px solid #533483;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #1a1a3e;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid #533483;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #533483;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .chat-input {
            padding: 20px;
            background: #0f3460;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: none;
            background: #16213e;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .chat-input input::placeholder { color: #666; }

        .chat-input button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #533483, #0f3460);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .chat-input button:hover { transform: scale(1.1); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 AI Agent</h1>
            <p>Your intelligent assistant — search, read files, weather & more</p>
        </div>

        <div class="chat-messages" id="messages">
            <div class="message agent">
                <div class="avatar">🤖</div>
                <div class="bubble">Hello! I'm your AI Agent. I can search the web, read files, check the weather, and play YouTube videos. How can I help you?</div>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="input" placeholder="Type a message..." />
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        const sendBtn = document.getElementById('sendBtn');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="avatar">${sender === 'user' ? '👤' : '🤖'}</div>
                <div class="bubble">${text}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function addTyping() {
            const div = document.createElement('div');
            div.className = 'message agent';
            div.id = 'typing';
            div.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            sendBtn.disabled = true;
            addTyping();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                removeTyping();
                addMessage(data.response, 'agent');
            } catch (err) {
                removeTyping();
                addMessage('Sorry, something went wrong. Please try again.', 'agent');
            }

            sendBtn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
